<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blueprint Editor Foundation</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <h1>Blueprint Editor</h1>
        <div id="header-controls"></div>
      </header>

      <main class="app-main">
        <aside class="left-sidebar">
          <section id="toolbar"></section>
          <section class="cursor-preview-dock" aria-label="Cursor preview">
            <canvas id="cursor-preview" width="132" height="132"></canvas>
            <div class="history-controls" aria-label="History controls">
              <button id="undo-button" type="button">Undo</button>
              <button id="redo-button" type="button">Redo</button>
            </div>
          </section>
        </aside>

        <section class="canvas-panel">
          <canvas id="blueprint-canvas" width="1100" height="700"></canvas>
        </section>

        <aside class="right-sidebar">
          <section id="properties-panel"></section>
          <section id="layers-panel"></section>
        </aside>
      </main>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
